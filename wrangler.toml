name = "echo-compliance"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "echo-compliance"
database_id = "7f1f66dc-6ca2-4986-81f3-b19cc86a0fa4"

[[kv_namespaces]]
binding = "CP_CACHE"
id = "7e683d188c6b472292fdfd7621506610"

[triggers]
crons = ["0 7 * * 1"]

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "EMAIL_SENDER"
service = "echo-email-sender"
